apiVersion: v1
kind: Secret
metadata:
  name: nexus-secrets
  namespace: nexus
type: Opaque
stringData:
  # Database password
  POSTGRES_PASSWORD: "nexus-prod-password-change-me"
  DATABASE_URL: "postgresql+asyncpg://nexus:nexus-prod-password-change-me@postgres:5432/nexus"
  # LLM API Keys — set the ones you need
  ANTHROPIC_API_KEY: ""
  GOOGLE_API_KEY: ""
  OPENAI_API_KEY: ""
  GROQ_API_KEY: ""
  MISTRAL_API_KEY: ""
