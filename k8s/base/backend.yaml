---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: nexus
  labels:
    app: backend
    app.kubernetes.io/part-of: nexus-platform
spec:
  replicas: 1  # Single replica — agents use Kafka consumer groups
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        # Run Alembic migrations before backend starts
        - name: migrate
          image: nexus-backend:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: nexus-config
            - secretRef:
                name: nexus-secrets
      containers:
        - name: backend
          image: nexus-backend:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: nexus-config
            - secretRef:
                name: nexus-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 12  # 2 minutes to start
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]  # Graceful drain
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: nexus
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      name: http
