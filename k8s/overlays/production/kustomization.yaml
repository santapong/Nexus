apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nexus-production

resources:
  - ../../base

namePrefix: prod-

commonLabels:
  environment: production

# Production-specific patches
patches:
  # Scale up for production
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"

  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

  # Production: higher limits, stricter settings
  - target:
      kind: ConfigMap
      name: nexus-config
    patch: |-
      - op: replace
        path: /data/DAILY_SPEND_LIMIT_USD
        value: "50.00"
      - op: replace
        path: /data/APP_ENV
        value: "production"
      - op: replace
        path: /data/LOG_LEVEL
        value: "WARNING"

  # PostgreSQL: production replicas
  - target:
      kind: StatefulSet
      name: postgres
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

  # Redis: production memory
  - target:
      kind: StatefulSet
      name: redis
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
