apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nexus-staging

resources:
  - ../../base

namePrefix: staging-

commonLabels:
  environment: staging

# Staging-specific patches
patches:
  # Lower resource requests for staging
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "250m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "256Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "512Mi"

  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

  # Staging uses lower daily spend limit
  - target:
      kind: ConfigMap
      name: nexus-config
    patch: |-
      - op: replace
        path: /data/DAILY_SPEND_LIMIT_USD
        value: "2.00"
      - op: replace
        path: /data/APP_ENV
        value: "staging"
