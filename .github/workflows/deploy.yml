name: Deploy

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/backend:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/backend:${{ needs.build-and-push.outputs.version }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push, scan]
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > /tmp/kubeconfig
        env:
          KUBE_CONFIG_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Deploy to staging
        env:
          KUBECONFIG: /tmp/kubeconfig
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          kubectl kustomize k8s/overlays/staging | \
            sed "s/:latest/:${VERSION}/g" | \
            kubectl apply -f -

      - name: Wait for rollout
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          kubectl rollout status deployment/nexus-backend -n nexus-staging --timeout=300s
          kubectl rollout status deployment/nexus-frontend -n nexus-staging --timeout=300s

      - name: Smoke test
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          BACKEND_URL=$(kubectl get svc nexus-backend -n nexus-staging -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl -sf "http://${BACKEND_URL}:8000/health" || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > /tmp/kubeconfig

      - name: Deploy to production
        env:
          KUBECONFIG: /tmp/kubeconfig
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          kubectl kustomize k8s/overlays/production | \
            sed "s/:latest/:${VERSION}/g" | \
            kubectl apply -f -

      - name: Wait for rollout
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          kubectl rollout status deployment/nexus-backend -n nexus-production --timeout=300s
          kubectl rollout status deployment/nexus-frontend -n nexus-production --timeout=300s
